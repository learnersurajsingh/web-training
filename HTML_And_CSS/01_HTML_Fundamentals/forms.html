<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <h1>Forms</h1>
    <form action="/action.php">
      <div>
        <label for="username">Enter Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter Username"
        />
      </div>
      <div>
        <label for="password">Enter Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter Password"
        />
      </div>
      <div>
        <label for="age">Enter Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter Age" />
      </div>
      <div>
        <label for="time">Enter Time:</label>
        <input type="time" id="time" name="time" />
      </div>
      <div>
        <label for="color">Select Color:</label>
        <input
          type="color"
          id="color"
          name="color"
          placeholder="Select Color"
        />
      </div>
      <div>
        <input type="checkbox" id="eligible" name="eligible" checked />
        <label for="eligible">I am 18+</label>
      </div>
      <div>
        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female" />
        <label for="female">Female</label>
      </div>
      <div>
        Choose your subjects:
        <input type="checkbox" id="maths" name="subject" value="maths" />
        <label for="maths">Maths</label>
        <input type="checkbox" id="science" name="subject" value="science" />
        <label for="science">Science</label>
        <input type="checkbox" id="history" name="subject" value="history" />
        <label for="history">History</label>
      </div>
      <div>
        Choose your profession :
        <select name="profession" id="profession">
          <option value="">Select Your Option</option>
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="engineer">Engineer</option>
          <option value="doctor">Doctor</option>
        </select>
      </div>
      <div>
        Select volume level:
        <input
          type="range"
          id="volume"
          name="volume"
          min="0"
          max="100"
          step="10"
          value="20"
        />
      </div>
      <div>
        <label for="feedback">Please Provide Feedback:</label>
        <textarea id="feedback" name="feedback" rows="1" cols="30"></textarea>
      </div>
      <button type="submit">Submit</button>
      <!-- <input type="submit" value="Submit"> -->
      <button type="reset">Reset</button>
      <button type="button">Normal Button</button>
      <!-- <input type="button" value="Normal Input Button"> -->
    </form>
    <br /><br /><br />

    <form action="https://www.google.com/search">
      <div>
        <label for="search">Search on Google:</label>
        <input type="text" id="search" name="q" placeholder="Search..." />
        <button type="submit">Search</button>
      </div>
    </form>
    <br><br><br>

    <h2>Registration Form</h2>
    <form action="/action.php">
        <div>
            <input type="text" name="fname" id="fname" placeholder="First Name" />
            <input type="text" name="lname" id="lname" placeholder="Last Name" />
        </div>
        <div>
            Please select gender:
            <select name="gender" id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div>
            Do you agree to all terms of service?
            <input type="checkbox" name="agree" id="agree" checked/>
            <label for="agree">Yes, I agree</label>
        </div>
        <button type="submit">Register</button>
    </form>
  </body>
</html>
